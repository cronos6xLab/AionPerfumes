<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aion Perfumes · Concentrado</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #faf7f2;
    --dark: #1a1612;
    --gold: #b8975a;
    --gold-light: #d4b483;
    --muted: #4a423c;
    --border: #ccc3b6;
    --green-wa: #25d366;
    --green-wa-dark: #128c4e;
    --success: #1f5c38;
    --success-bg: #d6f0e0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--cream);
    font-family: 'Jost', sans-serif;
    color: var(--dark);
    min-height: 100vh;
  }

  .header {
    background: var(--dark);
    padding: 18px 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 1px solid var(--gold);
  }
  .header h1 {
    font-family: 'Cormorant Garamond', serif;
    color: var(--gold-light);
    font-size: 1.5rem;
    font-weight: 300;
    letter-spacing: 4px;
    text-transform: uppercase;
  }

  .container {
    max-width: 480px;
    margin: 0 auto;
    padding: 0 0 130px;
  }

  .product-image-wrap {
    position: relative;
    width: 100%;
    height: 280px;
    overflow: hidden;
    background: #1a1612;
  }
  .product-image-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0.85;
  }
  .rating-badge {
    position: absolute;
    top: 16px;
    right: 16px;
    background: rgba(26,22,18,0.88);
    border: 1px solid var(--gold);
    color: var(--gold-light);
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 0.8rem;
    letter-spacing: 1px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .product-info { padding: 24px 20px 0; }
  .product-info h2 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.9rem;
    font-weight: 300;
    letter-spacing: 2px;
    color: var(--dark);
    margin-bottom: 4px;
  }
  .price-range {
    font-size: 0.9rem;
    color: #7a5c1a;
    font-weight: 500;
    letter-spacing: 1px;
    margin-bottom: 6px;
  }
  .product-subtitle {
    font-size: 0.78rem;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 20px;
  }

  .section-label {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 3px;
    color: var(--muted);
    margin-bottom: 12px;
    font-weight: 600;
  }

  .divider {
    height: 1px;
    background: var(--border);
    margin: 4px 20px 20px;
  }

  /* Promo buttons */
  .promo-section {
    padding: 0 20px 20px;
  }
  .promo-buttons {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .promo-btn {
    flex: 1;
    min-width: 100px;
    background: white;
    border: 1.5px solid var(--border);
    border-radius: 14px;
    padding: 12px 6px;
    font-family: 'Jost', sans-serif;
    font-size: 0.8rem;
    font-weight: 500;
    color: var(--dark);
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
    line-height: 1.3;
  }
  .promo-btn.active {
    background: var(--dark);
    color: white;
    border-color: var(--dark);
  }
  .promo-btn.promo-100 { border-bottom: 4px solid #b8975a; }
  .promo-btn.promo-60 { border-bottom: 4px solid #a3875a; }
  .promo-btn.promo-30 { border-bottom: 4px solid #8f7652; }
  .promo-btn small {
    display: block;
    font-size: 0.65rem;
    opacity: 0.8;
  }
  .promo-status {
    margin-top: 12px;
    background: #f4efe8;
    padding: 10px 14px;
    border-radius: 10px;
    font-size: 0.85rem;
    display: none;
  }
  .promo-status.visible { display: block; }
  .promo-selected-list {
    margin: 8px 0 4px;
    font-size: 0.8rem;
  }
  .promo-selected-item {
    display: inline-block;
    background: white;
    border-radius: 20px;
    padding: 2px 10px 2px 8px;
    margin: 3px 5px 3px 0;
    border: 1px solid var(--border);
  }
  .promo-selected-item span {
    margin-left: 6px;
    cursor: pointer;
    font-weight: bold;
    color: #a00;
  }
  .btn-finish-promo {
    background: var(--dark);
    color: white;
    border: none;
    border-radius: 10px;
    padding: 8px 16px;
    font-size: 0.8rem;
    font-weight: 500;
    margin-top: 8px;
    cursor: pointer;
    width: 100%;
  }

  .search-section { padding: 0 20px 16px; }
  .search-wrap { position: relative; }
  .search-wrap input {
    width: 100%;
    padding: 12px 16px 12px 42px;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    background: white;
    font-family: 'Jost', sans-serif;
    font-size: 0.88rem;
    color: var(--dark);
    outline: none;
    transition: border-color 0.2s;
  }
  .search-wrap input:focus { border-color: var(--gold); }
  .search-wrap input::placeholder { color: #5e554d; opacity: 1; }
  .search-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: #4a423c;
    font-size: 1rem;
    pointer-events: none;
  }
  .search-results {
    background: white;
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-top: 6px;
    overflow: hidden;
    display: none;
    box-shadow: 0 8px 24px rgba(0,0,0,0.1);
    position: relative;
    z-index: 50;
    max-height: 400px;
    overflow-y: auto;
  }
  .search-results.visible { display: block; }
  .search-result-item {
    padding: 12px 16px;
    cursor: pointer;
    border-bottom: 1px solid var(--border);
    font-size: 0.87rem;
    display: flex;
    align-items: flex-start;
    gap: 10px;
    transition: background 0.15s;
    color: var(--dark);
  }
  .search-result-item:last-child { border-bottom: none; }
  .search-result-item:hover { background: var(--cream); }
  .search-result-item .aroma-code {
    font-weight: 600;
    min-width: 60px;
    color: var(--dark);
  }
  .search-result-item .aroma-info {
    flex: 1;
  }
  .search-result-item .aroma-name {
    font-weight: 500;
    margin-bottom: 4px;
    color: var(--dark);
  }
  .search-result-item .aroma-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.3px;
  }
  .search-result-item .aroma-meta span {
    background: #f0ebe4;
    padding: 2px 8px;
    border-radius: 12px;
  }

  .selected-aroma-tag {
    display: none;
    margin: 0 20px 16px;
    background: #fff8ee;
    border: 1px solid #c9a96e;
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 0.85rem;
    align-items: center;
    gap: 10px;
  }
  .selected-aroma-tag.visible { display: flex; }
  .selected-aroma-tag .aroma-emoji { font-size: 1.5rem; }
  .selected-aroma-tag .aroma-text { flex: 1; }
  .selected-aroma-tag .aroma-text strong {
    display: block;
    font-weight: 600;
    color: var(--dark);
  }
  .selected-aroma-tag .aroma-text .aroma-code-badge {
    font-family: monospace;
    background: var(--dark);
    color: white;
    padding: 2px 8px;
    border-radius: 20px;
    font-size: 0.7rem;
    display: inline-block;
    margin-right: 6px;
  }
  .selected-aroma-tag .aroma-text small {
    color: var(--muted);
    font-size: 0.75rem;
  }
  .remove-aroma {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 1.1rem;
    padding: 0 4px;
  }

  .option-section { padding: 0 20px 20px; }
  .product-select {
    width: 100%;
    padding: 14px 16px;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    background: white;
    font-family: 'Jost', sans-serif;
    font-size: 0.9rem;
    color: var(--dark);
    outline: none;
  }

  .addon-section { padding: 0 20px 20px; }
  .addon-title { font-weight: 500; font-size: 0.9rem; margin-bottom: 2px; color: var(--dark); }
  .addon-optional { font-size: 0.75rem; color: var(--muted); margin-bottom: 12px; }
  .addon-option { display: flex; align-items: center; cursor: pointer; }
  .checkbox-box {
    width: 22px;
    height: 22px;
    border-radius: 6px;
    border: 2px solid #999;
    margin-right: 14px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.85rem;
    color: white;
    background: white;
    transition: all 0.2s;
  }
  .addon-option.checked .checkbox-box { background: var(--dark); border-color: var(--dark); }
  .addon-label { flex: 1; font-size: 0.9rem; color: var(--dark); }
  .addon-price { font-weight: 500; font-size: 0.9rem; color: var(--dark); }

  .quantity-section {
    padding: 0 20px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .quantity-label { font-weight: 500; font-size: 0.9rem; color: var(--dark); }
  .qty-control {
    display: flex;
    align-items: center;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    background: white;
  }
  .qty-btn {
    width: 44px; height: 44px;
    background: none; border: none;
    font-size: 1.3rem; color: var(--dark);
    cursor: pointer; transition: background 0.15s;
    display: flex; align-items: center; justify-content: center;
  }
  .qty-btn:hover { background: var(--cream); }
  .qty-display {
    width: 44px; text-align: center;
    font-weight: 500; font-size: 0.95rem;
    color: var(--dark);
    border-left: 1px solid var(--border);
    border-right: 1px solid var(--border);
    height: 44px; line-height: 44px;
  }

  .cart-summary {
    display: none;
    margin: 0 20px 16px;
    background: #edf7f1;
    border: 1px solid #9ecfb4;
    border-radius: 12px;
    padding: 14px 16px;
  }
  .cart-summary.visible { display: block; }
  .cart-summary-title {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--success);
    margin-bottom: 8px;
    font-weight: 600;
  }
  .cart-item, .promo-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.85rem;
    padding: 3px 0;
    color: var(--dark);
    border-bottom: 1px dashed #c0d9cc;
  }
  .promo-item {
    flex-wrap: wrap;
    padding: 8px 0;
  }
  .promo-header {
    display: flex;
    width: 100%;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
  }
  .promo-details {
    width: 100%;
    margin-top: 8px;
    padding-left: 16px;
    font-size: 0.78rem;
    display: none;
  }
  .promo-details.expanded { display: block; }
  .promo-detail-item {
    display: flex;
    justify-content: space-between;
    padding: 2px 0;
  }
  .cart-item-info, .promo-info {
    flex: 1;
  }
  .cart-item-price {
    margin-right: 8px;
    font-weight: 500;
  }
  .cart-item-remove, .promo-remove {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 1rem;
    padding: 4px 6px;
    border-radius: 50%;
    transition: all 0.15s;
  }
  .cart-item-remove:hover, .promo-remove:hover {
    background: #fdecea;
    color: #8b3010;
  }
  .cart-total {
    display: flex;
    justify-content: space-between;
    font-size: 0.95rem;
    font-weight: 600;
    border-top: 1px solid #9ecfb4;
    margin-top: 8px;
    padding-top: 8px;
    color: var(--success);
  }
  .btn-clear-cart {
    margin-top: 10px;
    width: 100%;
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px;
    font-family: 'Jost', sans-serif;
    font-size: 0.78rem;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-clear-cart:hover { background: #fdecea; color: #8b3010; border-color: #e0b0a0; }

  .action-buttons {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 480px;
    padding: 12px 20px 28px;
    background: linear-gradient(to top, var(--cream) 80%, transparent);
    display: flex;
    gap: 10px;
  }
  .btn-add {
    flex: 1;
    background: var(--dark);
    color: #ffffff;
    border: none;
    border-radius: 14px;
    padding: 16px;
    font-family: 'Jost', sans-serif;
    font-size: 0.88rem;
    font-weight: 500;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: background 0.2s, transform 0.1s;
  }
  .btn-add:hover { background: #2d2720; transform: translateY(-1px); }
  .btn-add:active { transform: translateY(0); }

  .btn-wa {
    flex: 1;
    background: var(--green-wa);
    color: #ffffff;
    border: none;
    border-radius: 14px;
    padding: 16px;
    font-family: 'Jost', sans-serif;
    font-size: 0.88rem;
    font-weight: 500;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: background 0.2s, transform 0.1s;
  }
  .btn-wa:hover { background: var(--green-wa-dark); transform: translateY(-1px); }
  .btn-wa:active { transform: translateY(0); }

  .toast {
    position: fixed;
    top: 80px;
    left: 50%;
    transform: translateX(-50%) translateY(-20px);
    background: var(--dark);
    color: #ffffff;
    padding: 12px 20px;
    border-radius: 10px;
    font-size: 0.85rem;
    opacity: 0;
    pointer-events: none;
    transition: all 0.3s;
    z-index: 999;
    white-space: nowrap;
    border-left: 3px solid var(--gold);
    max-width: 90vw;
    text-align: center;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<div class="header">
  <h1>✦ Aion Perfumes ✦</h1>
</div>

<div class="container">
  <div class="product-image-wrap">
    <img src="https://images.unsplash.com/photo-1541643600914-78b084683702?w=800&q=80" alt="Perfume Concentrado">
    <div class="rating-badge">⭐ 4.1 &nbsp;(162)</div>
  </div>

  <div class="product-info">
    <h2>Perfume Concentrado</h2>
    <div class="price-range">$169 – $589</div>
    <div class="product-subtitle">Longevity · Strong Sillage</div>
  </div>

  <div class="divider"></div>

  <!-- Promociones -->
  <div class="promo-section">
    <div class="section-label">Promociones por volumen</div>
    <div class="promo-buttons">
      <button class="promo-btn promo-100" id="promo-100-btn" onclick="startPromo('100ml')">
        4×3 en 100ml <small id="promo-100-price">$2,097</small>
      </button>
      <button class="promo-btn promo-60" id="promo-60-btn" onclick="startPromo('60ml')">
        5×4 en 60ml <small id="promo-60-price">$2,028</small>
      </button>
      <button class="promo-btn promo-30" id="promo-30-btn" onclick="startPromo('30ml')">
        6×5 en 30ml <small id="promo-30-price">$940</small>
      </button>
    </div>
    <div class="promo-status" id="promo-status">
      <div id="promo-status-text"></div>
      <div class="promo-selected-list" id="promo-selected-list"></div>
      <button class="btn-finish-promo" id="btn-finish-promo" onclick="finishPromo()" style="display:none;">Agregar promoción al carrito</button>
      <button class="btn-clear-cart" style="margin-top:6px;" onclick="cancelPromo()">Cancelar promoción</button>
    </div>
  </div>

  <div class="divider"></div>

  <div class="search-section">
    <div class="section-label">Elige tu aroma</div>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="search-input" placeholder="Buscar por código, nombre, casa, ocasión...">
      <div class="search-results" id="search-results"></div>
    </div>
  </div>

  <div class="selected-aroma-tag" id="selected-aroma-tag">
    <span class="aroma-emoji" id="tag-emoji">🧴</span>
    <div class="aroma-text">
      <strong id="tag-name">Aroma seleccionado</strong>
      <small id="tag-category">Código</small>
    </div>
    <button class="remove-aroma" onclick="clearAroma()">✕</button>
  </div>

  <div class="divider"></div>

  <div class="option-section">
    <div class="section-label">Presentación</div>
    <select class="product-select" id="product-option-select" onchange="updateSelectedOption()">
      <!-- Opciones cargadas desde JS -->
    </select>
  </div>

  <div class="divider"></div>

  <div class="addon-section">
    <div class="addon-title">Feromonas</div>
    <div class="addon-optional">Opcional</div>
    <div class="addon-option" id="addon-feromonas" onclick="toggleAddon()">
      <div class="checkbox-box" id="checkbox-feromonas"></div>
      <span class="addon-label">Feromonas</span>
      <span class="addon-price">+ $60.00</span>
    </div>
  </div>

  <div class="divider"></div>

  <div class="quantity-section">
    <span class="quantity-label">Cantidad</span>
    <div class="qty-control">
      <button class="qty-btn" onclick="changeQty(-1)">−</button>
      <div class="qty-display" id="qty-display">1</div>
      <button class="qty-btn" onclick="changeQty(1)">+</button>
    </div>
  </div>

  <div class="cart-summary" id="cart-summary">
    <div class="cart-summary-title">🛒 Resumen del pedido</div>
    <div id="cart-items-list"></div>
    <div class="cart-total">
      <span>Total estimado</span>
      <span id="cart-total-price">$0.00</span>
    </div>
    <button class="btn-clear-cart" onclick="clearCart()">🗑 Vaciar carrito</button>
  </div>
</div>

<div class="action-buttons">
  <button class="btn-add" onclick="addToCart()">✦ Añadir</button>
  <button class="btn-wa" onclick="sendToWhatsApp()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="white" style="flex-shrink:0">
      <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
    </svg>
    Pedir
  </button>
</div>

<script>
  // ══════════════════════════════════════════════════
  //  CONFIGURACIÓN
  // ══════════════════════════════════════════════════
  const WA_NUMBER = "528138917727";

  // Opciones de producto (Volumen + Concentración + Precio)
  const PRODUCT_OPTIONS = [
    // 30 ml
    { volume: '30ml', concentration: 'Sensación Aura (Extrait 33%)', price: 169 },
    { volume: '30ml', concentration: 'Impacto Radiante (Elixir 42%)', price: 209 },
    { volume: '30ml', concentration: 'Aura Intensa (Elixir 50%)', price: 249 },
    // 60 ml
    { volume: '60ml', concentration: 'Sensación Aura (Extrait 33%)', price: 289 },
    { volume: '60ml', concentration: 'Impacto Radiante (Elixir 42%)', price: 379 },

  // Inicializar select de opciones
  function populateSelect() {
    const select = document.getElementById('product-option-select');
    select.innerHTML = PRODUCT_OPTIONS.map((opt, i) => 
      `<option value="${i}" ${i === 0 ? 'selected' : ''}>${opt.volume} - ${opt.concentration} | $${opt.price}</option>`
    ).join('');
  }
  populateSelect();

  function updateSelectedOption() {
    const idx = document.getElementById('product-option-select').value;
    state.selectedOption = PRODUCT_OPTIONS[idx];
    updatePromoPrices(); // actualizar precios mostrados en botones de promo
  }

  // Actualizar precios de promociones según opción seleccionada
  function updatePromoPrices() {
    const vol = state.selectedOption.volume;
    const unit = state.selectedOption.price;
    let promo100 = unit * 3;
    let promo60 = unit * 4;
    let promo30 = unit * 5;
    document.getElementById('promo-100-price').textContent = `$${promo100.toFixed(0)}`;
    document.getElementById('promo-60-price').textContent = `$${promo60.toFixed(0)}`;
    document.getElementById('promo-30-price').textContent = `$${promo30.toFixed(0)}`;
  }
  updatePromoPrices();

  // Búsqueda
  const searchInput = document.getElementById('search-input');
  const searchResults = document.getElementById('search-results');

  searchInput.addEventListener('input', () => {
    const q = searchInput.value.toLowerCase().trim();
    if (!q) { searchResults.classList.remove('visible'); return; }
    
    const matches = AROMAS.filter(a => 
      a.code.toLowerCase().includes(q) ||
      a.name.toLowerCase().includes(q) ||
      a.brand.toLowerCase().includes(q) ||
      a.occasion.toLowerCase().includes(q) ||
      a.family.toLowerCase().includes(q)
    );
    
    searchResults.innerHTML = matches.length === 0
      ? `<div class="search-result-item"><span class="aroma-name" style="color:var(--muted)">Sin resultados para "${q}"</span></div>`
      : matches.map(a => {
          const idx = AROMAS.indexOf(a);
          return `<div class="search-result-item" onclick="handleAromaSelection(${idx})">
            <span class="aroma-code">${a.code}</span>
            <div class="aroma-info">
              <div class="aroma-name">${a.name}</div>
              <div class="aroma-meta">
                <span>${a.brand}</span>
                <span>${a.family}</span>
                <span>${a.occasion}</span>
              </div>
            </div>
          </div>`;
        }).join('');
    
    searchResults.classList.add('visible');
  });

  document.addEventListener('click', e => { 
    if (!e.target.closest('.search-wrap')) searchResults.classList.remove('visible'); 
  });

  function handleAromaSelection(idx) {
    const aroma = AROMAS[idx];
    if (promoState.active) {
      addToPromoSelection(aroma);
    } else {
      selectAroma(aroma);
    }
    searchResults.classList.remove('visible');
    searchInput.value = '';
  }

  function selectAroma(aroma) {
    state.selectedAroma = aroma;
    document.getElementById('tag-emoji').textContent = '🧴';
    document.getElementById('tag-name').innerHTML = `<span class="aroma-code-badge">${aroma.code}</span> ${aroma.name}`;
    document.getElementById('tag-category').textContent = `${aroma.brand} · ${aroma.family}`;
    document.getElementById('selected-aroma-tag').classList.add('visible');
    showToast(`🧴 ${aroma.code} "${aroma.name}" seleccionado`);
  }

  function clearAroma() {
    state.selectedAroma = null;
    document.getElementById('selected-aroma-tag').classList.remove('visible');
  }

  function toggleAddon() {
    if (promoState.active) {
      promoState.withFeromonas = !promoState.withFeromonas;
      updatePromoUI();
    } else {
      state.withFeromonas = !state.withFeromonas;
      document.getElementById('addon-feromonas').classList.toggle('checked', state.withFeromonas);
      document.getElementById('checkbox-feromonas').textContent = state.withFeromonas ? '✓' : '';
    }
  }

  function changeQty(delta) {
    state.quantity = Math.max(1, state.quantity + delta);
    document.getElementById('qty-display').textContent = state.quantity;
  }

  // ----- PROMOCIONES -----
  function startPromo(volume) {
    const currentOpt = state.selectedOption;
    if (currentOpt.volume !== volume) {
      showToast(`⚠️ Selecciona una presentación de ${volume} primero`);
      return;
    }
    
    promoState = {
      active: true,
      volume: volume,
      required: volume === '100ml' ? 4 : (volume === '60ml' ? 5 : 6),
      basePrice: currentOpt.price,
      concentration: currentOpt.concentration,
      withFeromonas: false,
      selectedAromas: []
    };
    
    document.querySelectorAll('.promo-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(`promo-${volume.replace('ml','')}-btn`).classList.add('active');
    document.getElementById('promo-status').classList.add('visible');
    updatePromoUI();
    
    state.selectedAroma = null;
    document.getElementById('selected-aroma-tag').classList.remove('visible');
    
    showToast(`🎁 Promoción ${promoState.required}×${promoState.required-1} en ${volume} activada`);
  }

  function updatePromoUI() {
    const count = promoState.selectedAromas.length;
    const required = promoState.required;
    document.getElementById('promo-status-text').innerHTML = `Selecciona ${required} aromas distintos (${count}/${required}) · ${promoState.concentration}`;
    
    const listDiv = document.getElementById('promo-selected-list');
    if (count === 0) {
      listDiv.innerHTML = '';
    } else {
      listDiv.innerHTML = promoState.selectedAromas.map((a, i) => 
        `<span class="promo-selected-item">${a.code} ${a.name} <span onclick="removePromoAroma(${i})">✕</span></span>`
      ).join('');
    }
    
    document.getElementById('btn-finish-promo').style.display = (count === required) ? 'block' : 'none';
    
    const addonDiv = document.getElementById('addon-feromonas');
    const checkbox = document.getElementById('checkbox-feromonas');
    if (promoState.withFeromonas) {
      addonDiv.classList.add('checked');
      checkbox.textContent = '✓';
    } else {
      addonDiv.classList.remove('checked');
      checkbox.textContent = '';
    }
  }

  function addToPromoSelection(aroma) {
    if (promoState.selectedAromas.length >= promoState.required) {
      showToast(`⚠️ Ya tienes los ${promoState.required} aromas`);
      return;
    }
    if (promoState.selectedAromas.some(a => a.code === aroma.code)) {
      showToast(`⚠️ ${aroma.code} ya está en la promoción`);
      return;
    }
    promoState.selectedAromas.push(aroma);
    updatePromoUI();
    
    if (promoState.selectedAromas.length === promoState.required) {
      showToast(`🎉 ¡Promoción completa! Presiona "Agregar"`);
    } else {
      showToast(`✅ ${aroma.code} añadido (${promoState.selectedAromas.length}/${promoState.required})`);
    }
  }

  function removePromoAroma(index) {
    promoState.selectedAromas.splice(index, 1);
    updatePromoUI();
  }

  function finishPromo() {
    if (promoState.selectedAromas.length !== promoState.required) {
      showToast(`⚠️ Selecciona exactamente ${promoState.required} aromas`);
      return;
    }
    
    const unitPrice = promoState.basePrice;
    const feromonasCost = promoState.withFeromonas ? 60 * promoState.required : 0;
    const payCount = promoState.required - 1;
    const totalPromoPrice = (unitPrice * payCount) + feromonasCost;
    
    const promoPack = {
      type: 'promo',
      volume: promoState.volume,
      concentration: promoState.concentration,
      required: promoState.required,
      payFor: payCount,
      aromas: [...promoState.selectedAromas],
      withFeromonas: promoState.withFeromonas,
      total: totalPromoPrice
    };
    
    state.cartItems.push(promoPack);
    updateCartSummary();
    cancelPromo();
    showToast(`🎁 Promoción agregada al carrito`);
  }

  function cancelPromo() {
    promoState.active = false;
    document.querySelectorAll('.promo-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('promo-status').classList.remove('visible');
    document.getElementById('btn-finish-promo').style.display = 'none';
    // Restaurar checkbox visual
    const addonDiv = document.getElementById('addon-feromonas');
    const checkbox = document.getElementById('checkbox-feromonas');
    if (state.withFeromonas) {
      addonDiv.classList.add('checked');
      checkbox.textContent = '✓';
    } else {
      addonDiv.classList.remove('checked');
      checkbox.textContent = '';
    }
  }

  // ----- CARRITO -----
  function addToCart() {
    if (promoState.active) {
      showToast('⚠️ Finaliza o cancela la promoción primero');
      return;
    }
    if (!state.selectedAroma) { showToast('⚠️ Elige un aroma primero'); return; }
    
    const opt = state.selectedOption;
    const unitPrice = opt.price + (state.withFeromonas ? 60 : 0);
    state.cartItems.push({
      type: 'single',
      aromaCode: state.selectedAroma.code,
      aromaName: state.selectedAroma.name,
      volume: opt.volume,
      concentration: opt.concentration,
      feromonas: state.withFeromonas,
      quantity: state.quantity,
      unitPrice,
      total: unitPrice * state.quantity
    });
    updateCartSummary();
    showToast(`✓ Añadido al carrito`);
  }

  function removeCartItem(index) {
    state.cartItems.splice(index, 1);
    updateCartSummary();
    showToast('🗑 Artículo eliminado');
  }

  function clearCart() { 
    state.cartItems = []; 
    updateCartSummary(); 
    showToast('🗑 Carrito vaciado'); 
  }

  function updateCartSummary() {
    if (state.cartItems.length === 0) { 
      document.getElementById('cart-summary').classList.remove('visible'); 
      return; 
    }
    
    let html = '';
    let total = 0;
    
    state.cartItems.forEach((item, i) => {
      if (item.type === 'single') {
        total += item.total;
        html += `<div class="cart-item">
          <span class="cart-item-info">${item.aromaCode} ${item.aromaName} · ${item.volume} ${item.concentration} ${item.feromonas ? '+Fer' : ''} ×${item.quantity}</span>
          <span class="cart-item-price">$${item.total.toFixed(2)}</span>
          <button class="cart-item-remove" onclick="removeCartItem(${i})">✕</button>
        </div>`;
      } else {
        total += item.total;
        const promoId = `promo-${i}`;
        html += `<div class="promo-item">
          <div class="promo-header" onclick="togglePromoDetails('${promoId}')">
            <span class="promo-info">🎁 ${item.required}×${item.payFor} ${item.volume} · ${item.concentration} ${item.withFeromonas ? '+Fer' : ''}</span>
            <span class="cart-item-price">$${item.total.toFixed(2)}</span>
            <button class="promo-remove" onclick="event.stopPropagation(); removeCartItem(${i})">✕</button>
          </div>
          <div class="promo-details" id="${promoId}">
            ${item.aromas.map(a => `<div class="promo-detail-item"><span>${a.code} ${a.name}</span><span>Incluido</span></div>`).join('')}
          </div>
        </div>`;
      }
    });
    
    document.getElementById('cart-items-list').innerHTML = html;
    document.getElementById('cart-total-price').textContent = `$${total.toFixed(2)}`;
    document.getElementById('cart-summary').classList.add('visible');
  }

  window.togglePromoDetails = function(id) {
    document.getElementById(id).classList.toggle('expanded');
  };

  function sendToWhatsApp() {
    if (state.cartItems.length === 0) { showToast('⚠️ Carrito vacío'); return; }
    const total = state.cartItems.reduce((s, i) => s + i.total, 0);
    const fecha = new Date().toLocaleDateString('es-MX', { day:'2-digit', month:'2-digit', year:'numeric' });

    let msg = `🌸 *NUEVO PEDIDO — Aion Perfumes*\n📅 ${fecha} a las ${hora}\n━━━━━━━━━━━━━━━━━━━━━\n\n`;

      if (item.type === 'single') {

      } else {
        msg += `*${i+1}. 🎁 PROMO ${item.required}×${item.payFor} ${item.volume} · ${item.concentration}${item.withFeromonas ? ' + Feromonas' : ''}*\n`;
        item.aromas.forEach(a => msg += `   • ${a.code} ${a.name}\n`);
        msg += `   💵 Total promo: $${item.total.toFixed(2)}\n\n`;
      }
    });
    
    msg += `━━━━━━━━━━━━━━━━━━━━━\n💰 *TOTAL: $${total.toFixed(2)} MXN*\n━━━━━━━━━━━━━━━━━━━━━\n\n`;
    msg += `📋 *Al finalizar el pago recibirás un formulario para tus datos y dirección.*\n\n_Por favor envíame el link de Mercado Pago. ¡Gracias! 🙏_`;
    
    const url = `https://wa.me/${WA_NUMBER}?text=${encodeURIComponent(msg)}`;
    showToast('📲 Abriendo WhatsApp...');
    setTimeout(() => window.open(url, '_blank'), 600);
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(t._timer);
    t._timer = setTimeout(() => t.classList.remove('show'), 2800);
  }

  // Exponer globales
  window.updateSelectedOption = updateSelectedOption;
  window.handleAromaSelection = handleAromaSelection;
  window.clearAroma = clearAroma;
  window.toggleAddon = toggleAddon;
  window.changeQty = changeQty;
  window.startPromo = startPromo;
  window.finishPromo = finishPromo;
  window.cancelPromo = cancelPromo;
  window.removePromoAroma = removePromoAroma;
  window.addToCart = addToCart;
  window.removeCartItem = removeCartItem;
  window.clearCart = clearCart;
  window.sendToWhatsApp = sendToWhatsApp;
</script>
</body>
</html>
